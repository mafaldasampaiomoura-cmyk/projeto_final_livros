<h2>Editar Livro</h2>

<div *ngIf="book">

<input [(ngModel)]="book.title" placeholder="Título">

<input [(ngModel)]="book.author" placeholder="Autor">

<input [(ngModel)]="book.genre" placeholder="Género">

<select [(ngModel)]="book.status">

<option value="TO_READ">Por ler</option>
<option value="READING">A ler</option>
<option value="READ">Lido</option>

</select>

<input type="number" [(ngModel)]="book.rating" min="0" max="5" [disabled]="book.status !== 'READ'">

<button (click)="saveBook()">Guardar</button>

</div>
