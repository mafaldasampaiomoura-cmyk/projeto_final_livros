<div class="page">
  <div class="form-card">
    <div class="form-header">
      <h2>Adicionar livro</h2>
      <p>Preenche os dados do livro e guarda.</p>
    </div>

    <form class="form-grid" (ngSubmit)="onSubmit()" [formGroup]="form">

      
      <input class="input" placeholder="Título" formControlName="title" />
      <input class="input" placeholder="Autor" formControlName="author" />
      <input class="input" placeholder="Género" formControlName="genre" />

      <select class="input" formControlName="status">
        <option value="TO_READ">Por ler</option>
        <option value="READING">A ler</option>
        <option value="READ">Lido</option>
      </select>

      <button class="btn-primary" type="submit">Guardar</button>
    </form>
  </div>
</div>
