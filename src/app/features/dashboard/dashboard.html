<div class="kpis">
  <div class="kpi-card">
    <p>Total livros</p>
    <h2>{{ totalBooks }}</h2>
  </div>
 
  <div class="kpi-card">
    <p>Livros lidos</p>
    <h2>{{ readBooks }}</h2>
  </div>
  
  <div class="kpi-card">
  <p>% lidos</p>
  <h2>{{ readPercentage }} %</h2>
  </div>
  
</div>

 <h3> Os meus Livros </h3>

@for (book of LastBook; track book.id) {
  <div class="book-card">
    <div class="book-top">
      <div>
        <h3 class="book-title">{{ book.title }}</h3>
        <p class="book-meta">{{ book.author }} · {{ book.genre }}</p>
      </div>

      <button type="button" class="edit-btn" (click)="editBook(book.id)">
        <img [src]="editar" class="edit-icon" alt="" />
        <span>Editar</span>
      </button>
    </div>

    <div class="book-bottom">
      <span class="pill">{{ book.status | statusLabel }}</span>
      <span class="pill">⭐ {{ book.rating }}</span>
    </div>
  </div>
}
