<div class="login-page">
  <div class="login-card">
    <h2>Login</h2>

    <form (ngSubmit)="login()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>

      <button type="submit">Entrar</button>
    </form>

    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </div>
</div>
